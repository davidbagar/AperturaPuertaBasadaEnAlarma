blueprint:
  name: "Desbloqueo automático de puerta (Bermuda Total: ESPHome + Shelly)"
  description: >
    MÁXIMA SEGURIDAD: Desbloquea la puerta cuando entras en la zona GPS y
    te aproximas físicamente a menos de los metros seleccionados del proxy de entrada (ESPHome o Shelly).
  domain: automation
  input:
    person:
      name: Persona
      description: La persona que debe entrar en la zona para iniciar el proceso.
      selector:
        entity:
          domain: person
    alarm_entity:
      name: Panel de Alarma
      description: Selecciona tu alarma. Si está armada, la puerta NO se abrirá.
      selector:
        entity:
          domain: alarm_control_panel
    zone:
      name: Zona
      default: zone.home
      description: La zona geográfica en la que debe entrar la persona (habitualmente Casa).
      selector:
        entity:
          domain: zone
    area:
      name: Área (Habitación)
      description: Selecciona el área del proxy Bluetooth de tu puerta de entrada (Cocina).
      selector:
        area: {}
    beacon:
      name: Baliza Bluetooth (Sensor de Área)
      description: Selecciona la entidad que se llama exactamente "Area" de tu iPhone en Bermuda.
      selector:
        entity:
          integration: bermuda
          multiple: true
          domain: sensor
          device_class: bermuda__custom_device_class
    distance_sensor:
      name: Sensor de Distancia de Bermuda
      description: Selecciona la entidad "sensor.iphone_david_bluetooth_distance_to_general_cocina".
      selector:
        entity:
          domain: sensor
    distance_threshold:
      name: Umbral de Distancia Máxima (Metros)
      default: 2.0
      description: La distancia máxima real a la que debes estar de la puerta para que abra.
      selector:
        number:
          min: 0.5
          max: 5.0
          step: 0.1
          unit_of_measurement: m
          mode: slider
    timeout:
      name: Tiempo límite tras entrar a la zona
      default:
        hours: 0
        minutes: 10
        seconds: 0
      description: Tiempo máximo para llegar a casa desde que el GPS detecta la zona.
      selector:
        duration:
    minimum_beacon_time:
      name: Tiempo mínimo de detección
      default:
        hours: 0
        minutes: 0
        seconds: 3
      description: Tiempo que debes estar en zona antes de validar la distancia.
      selector:
        duration:
    lock:
      name: Cerradura
      selector:
        entity:
          domain: lock
    enable_telegram:
      name: ¿Activar Telegram?
      default: false
      selector:
        boolean:

mode: single

variables:
  timeout: !input timeout
  person: !input person
  lock: !input lock
  zone: !input zone
  alarm_entity: !input alarm_entity
  distance_sensor: !input distance_sensor
  distance_threshold: !input distance_threshold

trigger:
  - trigger: zone
    entity_id: !input person
    zone: !input zone
    event: enter

action:
  # COMPROBACIÓN DE SEGURIDAD 1: Detener si la alarma está puesta
  - condition: template
    value_template: "{{ is_state(alarm_entity, 'disarmed') }}"

  # Enviar aviso previo por Telegram si está activo
  - action: telegram_bot.send_message
    metadata: {}
    enabled: !input enable_telegram
    response_variable: response
    data:
      target: '{{state_attr(person,"telegram_id")}}'
      message: "Te hemos detectado cerca de casa. La puerta se abrirá al acercarte."
      one_time_keyboard: true
      inline_keyboard:
        - Cancelar:/cancel,Abrir:/unlock

  # ESPERA ACTIVA: Espera a que entres en el Área de la cocina
  - wait_for_trigger:
      - trigger: state
        entity_id: !input beacon
        id: unlock_by_bluetooth_beacon
        attribute: area_id
        to: !input area
        for: !input minimum_beacon_time
    continue_on_timeout: true
    timeout: !input timeout

  # EVALUACIÓN FINAL: Comprobación estricta de metros antes de abrir
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.id == 'unlock_by_bluetooth_beacon' }}"
          # COMPROBACIÓN DE SEGURIDAD 2: ¿Estás realmente a menos de los metros indicados?
          - condition: template
            value_template: "{{ states(distance_sensor) | float(100) < (distance_threshold | float) }}"
        sequence:
          - action: lock.unlock
            target:
              entity_id: !input lock
          - action: notify.notify
            data:
              title: "🔑 Domótica"
              message: "Puerta abierta automáticamente. Distancia verificada por Bermuda mediante red híbrida."
    default:
      - action: logger.log
        data:
          message: "Apertura cancelada: No se cumplió el rango de distancia estricto."

